<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelos de Prediccion - SIPSA Papa</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Courier New", monospace; background: #f8f9f4; color: #1a2e1a; }
header { background: #2d6a4f; color: white; padding: 16px 20px; }
header h1 { font-size: 1.1rem; font-weight: bold; }
header p { font-size: 0.7rem; opacity: 0.8; margin-top: 4px; }
.wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }
.selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.btn-modelo {
  font-family: "Courier New", monospace;
  font-size: 0.7rem; padding: 8px 14px;
  border: 2px solid #2d6a4f; border-radius: 4px;
  background: white; color: #2d6a4f; cursor: pointer;
  transition: all 0.2s;
}
.btn-modelo.active { background: #2d6a4f; color: white; }
.btn-modelo:hover { background: #2d6a4f; color: white; }
.card { background: white; border: 1px solid #d4dace; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
.card-head { padding: 14px 18px; border-bottom: 1px solid #eef1ea; background: #f5f7f2; }
.card-head h2 { font-size: 0.9rem; color: #2d6a4f; }
.card-head .tag { font-size: 0.6rem; background: #e8f4ed; color: #2d6a4f; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
.card-body { padding: 16px 18px; }
.formula { background: #1a2e1a; color: #7ec8a0; padding: 12px 16px; border-radius: 6px; font-size: 0.78rem; line-height: 1.8; margin: 10px 0; overflow-x: auto; white-space: pre; }
.params-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin: 12px 0; }
.param { background: #f5f7f2; border-radius: 6px; padding: 10px; }
.param-name { font-size: 0.6rem; text-transform: uppercase; color: #6b7d6e; margin-bottom: 4px; }
.param-val { font-size: 0.95rem; font-weight: bold; color: #1a2e1a; }
.param-desc { font-size: 0.62rem; color: #6b7d6e; margin-top: 2px; }
.pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.pros { background: #f0f7f2; border-left: 3px solid #2d6a4f; padding: 10px 12px; border-radius: 0 6px 6px 0; }
.cons { background: #fdf5f0; border-left: 3px solid #c77b2e; padding: 10px 12px; border-radius: 0 6px 6px 0; }
.pros h4, .cons h4 { font-size: 0.65rem; text-transform: uppercase; margin-bottom: 6px; }
.pros h4 { color: #2d6a4f; }
.cons h4 { color: #c77b2e; }
.pros ul, .cons ul { list-style: none; }
.pros li, .cons li { font-size: 0.7rem; line-height: 1.7; }
.pros li::before { content: "+ "; color: #2d6a4f; }
.cons li::before { content: "- "; color: #c77b2e; }
#chart { width: 100%; height: 320px; }
.status { font-size: 0.68rem; color: #6b7d6e; padding: 8px 0; }
.veredicto { padding: 12px 16px; border-radius: 6px; margin-top: 12px; font-size: 0.78rem; line-height: 1.6; }
.veredicto.bueno { background: #f0f7f2; border-left: 3px solid #2d6a4f; }
.veredicto.malo { background: #fdf0f0; border-left: 3px solid #b84040; }
.veredicto.regular { background: #fef9ec; border-left: 3px solid #c77b2e; }
.metrica { display: inline-block; margin-right: 16px; }
.metrica-val { font-size: 1.1rem; font-weight: bold; }
.metrica-label { font-size: 0.6rem; color: #6b7d6e; display: block; }
@media(max-width:480px){ .pros-cons { grid-template-columns: 1fr; } #chart { height: 240px; } }
</style>
</head>
<body>
<header>
  <h1>Comparador de Modelos - Precio Papa Colombia</h1>
  <p>Herramienta pedagogica | Datos reales SIPSA 1332 dias | Serie volatil CV=27%</p>
</header>
<div class="wrap">

  <div class="selector" id="selector"></div>

  <div class="card">
    <div class="card-head">
      <h2 id="modeloNombre">Cargando...</h2>
    </div>
    <div class="card-body">
      <p id="modeloDesc" style="font-size:0.78rem;line-height:1.6;color:#3a5a3a;margin-bottom:10px;"></p>
      <div class="formula" id="modeloFormula"></div>
      <div class="params-grid" id="modeloParams"></div>
      <div class="pros-cons">
        <div class="pros"><h4>Ventajas para esta serie</h4><ul id="pros"></ul></div>
        <div class="cons"><h4>Desventajas para esta serie</h4><ul id="cons"></ul></div>
      </div>
      <div class="veredicto" id="veredicto"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><h2>Prediccion 7 dias <span class="tag" id="tagModelo"></span></h2></div>
    <div class="card-body">
      <div id="status" class="status">Cargando datos SIPSA...</div>
      <div id="chart"></div>
      <div id="metricas" style="margin-top:12px;"></div>
    </div>
  </div>

</div>

<script>
var MODELOS = {
  media_movil: {
    nombre: "Media Movil Simple (SMA)",
    tag: "Clasico",
    desc: "Promedia los ultimos N precios con igual peso. Predice que el precio futuro sera el promedio reciente. Es el modelo mas simple y el punto de partida de cualquier analisis de series temporales.",
    formula: "P(t+k) = (1/N) * SUM[P(t-i), i=0..N-1]\n\nDonde N=30 dias (ventana)\nk = horizonte de prediccion (1..7 dias)",
    params: [
      { nombre: "Ventana N", val: "30 dias", desc: "Dias incluidos en el promedio" },
      { nombre: "Peso", val: "Uniforme", desc: "Todos los dias pesan igual" },
      { nombre: "Horizonte", val: "7 dias", desc: "Dias hacia adelante" },
    ],
    pros: ["Muy simple de entender", "Sin parametros que calibrar", "Estable, no diverge"],
    cons: ["Ignora tendencia reciente", "Lento para adaptarse a cambios", "Predice el mismo valor todos los dias", "No captura la autocorrelacion lag1=0.946"],
    veredicto: "malo",
    veredictotxt: "Para esta serie con alta autocorrelacion (lag1=0.946), predecir siempre la media es suboptimo. El precio de manana es casi siempre parecido al de hoy, no al promedio de 30 dias. Error tipico: ~6-8% diario.",
    calcular: function(pr, med) {
      var m = pr.slice(-30).reduce(function(a,b){return a+b;},0)/Math.min(pr.length,30);
      var res = [];
      for(var i=0;i<7;i++) res.push(Math.round(m));
      return res;
    }
  },
  tendencia_lineal: {
    nombre: "Tendencia Lineal (OLS)",
    tag: "Clasico",
    desc: "Ajusta una linea recta sobre los ultimos 30 dias usando minimos cuadrados ordinarios y extrapola hacia adelante. Asume que la tendencia reciente continua indefinidamente.",
    formula: "P(t+k) = a + b*(t+k)\n\nb = SUM[(xi-xm)*(yi-ym)] / SUM[(xi-xm)^2]\na = ym - b*xm\n\nDonde xi=indice dia, yi=precio dia i",
    params: [
      { nombre: "Ventana", val: "30 dias", desc: "Datos para estimar la pendiente" },
      { nombre: "Metodo", val: "OLS", desc: "Minimos cuadrados ordinarios" },
      { nombre: "Supuesto", val: "Linealidad", desc: "Tendencia constante hacia adelante" },
    ],
    pros: ["Captura tendencia de corto plazo", "Facil de interpretar", "Bien documentado"],
    cons: ["Diverge en series volatiles", "La pendiente de 7 dias puede ser espuria", "No respeta reversion a la media", "Extrapolacion no valida en series no estacionarias"],
    veredicto: "malo",
    veredictotxt: "El mayor problema de esta serie: sube fuerte 7 dias, la tendencia lineal predice que seguira subiendo indefinidamente. Pero los datos muestran que despues de picos el precio revierte en ~16.5 dias. Este modelo causo predicciones de +15% a +30% en pruebas reales.",
    calcular: function(pr) {
      var v = pr.slice(-30);
      var n=v.length, m=v.reduce(function(a,b){return a+b;},0)/n, xm=(n-1)/2;
      var num=0,den=0;
      v.forEach(function(y,x){num+=(x-xm)*(y-m);den+=(x-xm)*(x-xm);});
      var sl=den?num/den:0;
      var res=[];
      for(var i=0;i<7;i++) res.push(Math.round(Math.max(m+sl*(n+i),500)));
      return res;
    }
  },
  ema: {
    nombre: "Media Exponencial (EMA)",
    tag: "Tecnico",
    desc: "Promedia con peso exponencial decreciente: los dias recientes pesan mas que los lejanos. Alpha controla la velocidad de adaptacion. Usada ampliamente en analisis tecnico de trading.",
    formula: "EMA(t) = alpha*P(t) + (1-alpha)*EMA(t-1)\n\nP(t+k) = EMA(t) + slope*(k)\nslope = pendiente suavizada ultimos 14d\nalpha = 0.1 (suavizado fuerte)",
    params: [
      { nombre: "Alpha", val: "0.10", desc: "Peso al dato mas reciente" },
      { nombre: "Suavizado", val: "Fuerte", desc: "Reduce ruido, mas estable" },
      { nombre: "Pendiente", val: "14 dias", desc: "Ventana para calcular slope" },
    ],
    pros: ["Mas peso a datos recientes", "Reduce ruido", "Clasico en trading"],
    cons: ["Pendiente sigue divergiendo", "EMA queda rezagada en picos", "Alpha es arbitrario sin calibracion", "Misma limitacion que OLS en extrapolacion"],
    veredicto: "regular",
    veredictotxt: "Mejor que SMA para capturar cambios recientes, pero la extrapolacion con pendiente sigue divergiendo en series volatiles como esta. En pruebas reales seguia prediciendo +15% al dia 7.",
    calcular: function(pr) {
      var alpha=0.1, ema=pr[0];
      for(var i=1;i<pr.length;i++) ema=alpha*pr[i]+(1-alpha)*ema;
      var rec=pr.slice(-14), nr=rec.length;
      var mr=rec.reduce(function(a,b){return a+b;},0)/nr, xmr=(nr-1)/2;
      var num=0,den=0;
      rec.forEach(function(y,x){num+=(x-xmr)*(y-mr);den+=(x-xmr)*(x-xmr);});
      var sl=den?num/den:0;
      var res=[];
      for(var i=0;i<7;i++) res.push(Math.round(Math.max(ema+sl*(i+1),500)));
      return res;
    }
  },
  reversion_media: {
    nombre: "Reversion a la Media",
    tag: "Estadistico",
    desc: "Asume que el precio siempre revierte al promedio historico. Cada dia el precio se acerca un porcentaje fijo (vel) hacia la media. Fundamentado en la hipotesis de mercados eficientes para commodities.",
    formula: "P(t+k) = P(t+k-1) + vel*(media30 - P(t+k-1))\n\nDonde vel = velocidad de reversion (8% diario)\nmedia30 = promedio ultimos 30 dias\n\nEquivalente a: P(t+k) = media30 + (P(t)-media30)*(1-vel)^k",
    params: [
      { nombre: "Velocidad", val: "8% / dia", desc: "Fraccion del gap que se cierra" },
      { nombre: "Media", val: "30 dias", desc: "Punto de atraccion" },
      { nombre: "Calibracion", val: "16.5 dias", desc: "Reversion observada en datos reales" },
    ],
    pros: ["Fundamentado en datos: reversion real = 16.5 dias", "No diverge", "Correcto cuando precio esta en extremo"],
    cons: ["Cuando precio esta en rango normal, la media NO es el mejor predictor", "Ignora autocorrelacion alta (lag1=0.946)", "Velocidad arbitraria sin calibracion bayesiana"],
    veredicto: "regular",
    veredictotxt: "Correcto en teoria para series con reversion documentada. El problema: con vel=8% y precio solo 1 desviacion de la media, predice caidas cuando la autocorrelacion dice que el precio de hoy predice bien el de manana. Adecuado cuando z-score > 1.5.",
    calcular: function(pr, med30) {
      var vel=0.08, prev=pr[pr.length-1], res=[];
      for(var i=0;i<7;i++){
        var p=prev+vel*(med30-prev);
        res.push(Math.round(p));
        prev=p;
      }
      return res;
    }
  },
  ar1_fijo: {
    nombre: "AR(1) con alpha fijo",
    tag: "Econometrico",
    desc: "Modelo autorregresivo de orden 1: el precio de manana depende linealmente del precio de hoy. Alpha fijo calibrado sobre la autocorrelacion observada lag1=0.946. Estandar en econometria de series de tiempo.",
    formula: "P(t+1) = alpha*P(t) + (1-alpha)*mu\n\nalpha = 0.90 (fijo, calibrado sobre lag1=0.946)\nmu = media30 (nivel de largo plazo)\n\nVarianza pronostico: sigma^2 * (1-alpha^2k)/(1-alpha^2)",
    params: [
      { nombre: "Alpha", val: "0.90", desc: "Calibrado sobre autocorrelacion lag1" },
      { nombre: "Mu", val: "Media 30d", desc: "Nivel de largo plazo" },
      { nombre: "Base teorica", val: "Box-Jenkins", desc: "Metodologia estandar ARIMA" },
    ],
    pros: ["Calibrado sobre datos reales (lag1=0.946)", "No diverge", "Estandar en econometria", "Captura persistencia de la serie"],
    cons: ["Alpha fijo no distingue entre regimenes", "Ignora cuando precio esta en extremo estadistico", "No incorpora variables exogenas"],
    veredicto: "bueno",
    veredictotxt: "El mejor modelo simple para esta serie. Alpha=0.90 refleja la autocorrelacion real medida (lag1=0.946). Produce predicciones entre +1% y +6% cuando el precio esta cerca de la media, coherente con la volatilidad diaria promedio de 6.21%.",
    calcular: function(pr, med30) {
      var alpha=0.90, prev=pr[pr.length-1], res=[];
      for(var i=0;i<7;i++){
        var p=alpha*prev+(1-alpha)*med30;
        res.push(Math.round(p));
        prev=p;
      }
      return res;
    }
  },
  ar1_adaptativo: {
    nombre: "AR(1) Adaptativo (modelo actual)",
    tag: "Actual",
    desc: "AR(1) con alpha que cambia segun el z-score actual. Cuando el precio esta en rango normal usa alta persistencia (alpha=0.90). Cuando esta en extremo estadistico aumenta la reversion (alpha=0.55). Combina persistencia y reversion de forma dinamica.",
    formula: "alpha = 0.90 si |z| < 1.0  (rango normal)\nalpha = 0.75 si |z| < 1.5  (leve desviacion)\nalpha = 0.55 si |z| >= 1.5 (extremo estadistico)\n\nP(t+1) = alpha*P(t) + (1-alpha)*media30\nz = (P(t) - media30) / std30",
    params: [
      { nombre: "Alpha min", val: "0.55", desc: "En extremo estadistico" },
      { nombre: "Alpha max", val: "0.90", desc: "En rango normal" },
      { nombre: "Umbral", val: "|z| = 1.0/1.5", desc: "Puntos de cambio de regimen" },
    ],
    pros: ["Adapta persistencia al contexto", "Combina AR(1) y reversion a la media", "Fundamentado en datos reales", "No diverge"],
    cons: ["Umbrales z=1.0/1.5 son arbitrarios", "Sin variables exogenas validadas", "Perturbaciones contextuales aun sin calibrar"],
    veredicto: "bueno",
    veredictotxt: "Mejor que AR(1) fijo porque distingue regimenes. Con z=-1.07 actual usa alpha=0.75 (mezcla moderada). La limitacion principal: los ajustes de abastecimiento, lluvia y ACPM aun no estan calibrados sobre datos locales de Ipiales.",
    calcular: function(pr, med30, std30) {
      var hoy=pr[pr.length-1], z=(hoy-med30)/std30;
      var az=Math.abs(z), alpha=az<1.0?0.90:az<1.5?0.75:0.55;
      var prev=hoy, res=[];
      for(var i=0;i<7;i++){
        var p=alpha*prev+(1-alpha)*med30;
        res.push(Math.round(p));
        prev=p;
      }
      return res;
    }
  },
  zscore_rsi: {
    nombre: "Z-score + RSI Combinado",
    tag: "Tecnico avanzado",
    desc: "Usa dos indicadores independientes para confirmar senales. Z-score mide desviacion estadistica. RSI mide momentum relativo. Solo ajusta el modelo cuando ambos confirman la misma direccion.",
    formula: "z = (P(t) - media30) / std30\nRSI14 = 100 - 100/(1 + AG/AP)\n\nSi z > 1.5 Y RSI > 70: alpha = 0.50 (reversion fuerte)\nSi z < -1.5 Y RSI < 30: alpha = 0.50 (rebote fuerte)\nOtro caso: alpha = 0.90 (persistencia)",
    params: [
      { nombre: "RSI actual", val: "46.3", desc: "Zona neutral (30-70)" },
      { nombre: "Z-score", val: "-1.07", desc: "Rango normal (<1.5 desv)" },
      { nombre: "Senal hoy", val: "SIN SENAL", desc: "Ambos indicadores neutrales" },
    ],
    pros: ["Doble confirmacion reduce falsas senales", "RSI documentado en commodities agricolas", "Solo actua en extremos reales"],
    cons: ["Hoy no hay senal (RSI=46, z=-1.07)", "En zona neutral se comporta igual que AR(1)", "RSI en serie diaria tiene mas ruido que en datos semanales"],
    veredicto: "bueno",
    veredictotxt: "Correcto conceptualmente pero hoy no genera senal diferente al AR(1) basico porque RSI=46 y z=-1.07 estan en zona neutral. Util para detectar picos extremos. En los datos historicos, los momentos RSI>70 + z>1.5 coincidieron con los picos de $4000-$4500.",
    calcular: function(pr, med30, std30) {
      var hoy=pr[pr.length-1], z=(hoy-med30)/std30;
      var per=14, g=0, p2=0;
      for(var i=pr.length-per;i<pr.length;i++){
        var d=pr[i]-pr[i-1]; if(d>0)g+=d; else p2+=Math.abs(d);
      }
      var ag=g/per,ap=p2/per, rsi=ap===0?100:100-100/(1+ag/ap);
      var alpha=0.90;
      if(z>1.5&&rsi>70) alpha=0.50;
      if(z<-1.5&&rsi<30) alpha=0.50;
      var prev=hoy, res=[];
      for(var i=0;i<7;i++){
        var pt=alpha*prev+(1-alpha)*med30;
        res.push(Math.round(pt));
        prev=pt;
      }
      return res;
    }
  }
};

var _historico = null;
var _modeloActual = "ar1_adaptativo";

async function cargarDatos() {
  document.getElementById("status").textContent = "Consultando SIPSA del DANE...";
  try {
    var r = await fetch("/api/sipsa?refresh=1");
    var data = await r.json();
    if (!data.ok) throw new Error(data.error || "Error");
    _historico = data.historico;
    document.getElementById("status").textContent = data.historico.length + " dias cargados | ultimo: " + data.historico[data.historico.length-1].fecha;
    renderModelo(_modeloActual);
  } catch(e) {
    document.getElementById("status").textContent = "Error: " + e.message;
  }
}

function calcEstadisticos() {
  if (!_historico) return null;
  var pr = _historico.map(function(d){return d.precio;});
  var v30 = pr.slice(-30);
  var med = v30.reduce(function(a,b){return a+b;},0)/v30.length;
  var std = Math.sqrt(v30.reduce(function(s,x){return s+(x-med)*(x-med);},0)/v30.length);
  return { pr: pr, med: med, std: std };
}

function renderModelo(key) {
  _modeloActual = key;
  var m = MODELOS[key];
  if (!m) return;

  document.querySelectorAll(".btn-modelo").forEach(function(b){ b.classList.remove("active"); });
  var btn = document.getElementById("btn-" + key);
  if (btn) btn.classList.add("active");

  document.getElementById("modeloNombre").innerHTML = m.nombre + ' <span class="tag">' + m.tag + "</span>";
  document.getElementById("modeloDesc").textContent = m.desc;
  document.getElementById("modeloFormula").textContent = m.formula;
  document.getElementById("tagModelo").textContent = m.tag;

  var paramsHtml = "";
  m.params.forEach(function(p){
    paramsHtml += "<div class='param'><div class='param-name'>" + p.nombre + "</div><div class='param-val'>" + p.val + "</div><div class='param-desc'>" + p.desc + "</div></div>";
  });
  document.getElementById("modeloParams").innerHTML = paramsHtml;

  var prosHtml = "", consHtml = "";
  m.pros.forEach(function(p){ prosHtml += "<li>" + p + "</li>"; });
  m.cons.forEach(function(c){ consHtml += "<li>" + c + "</li>"; });
  document.getElementById("pros").innerHTML = prosHtml;
  document.getElementById("cons").innerHTML = consHtml;

  document.getElementById("veredicto").className = "veredicto " + m.veredicto;
  document.getElementById("veredicto").textContent = m.veredictotxt;

  if (!_historico) return;
  var est = calcEstadisticos();
  var pred = m.calcular(est.pr, est.med, est.std);
  renderGrafica(pred, est);
}

function renderGrafica(pred, est) {
  var hist = _historico.slice(-60);
  var hoy = hist[hist.length-1];
  var fechasPred = [];
  var base = new Date(hoy.fecha + "T12:00:00Z");
  for(var i=0;i<7;i++){
    var d=new Date(base); d.setUTCDate(d.getUTCDate()+i+1);
    fechasPred.push(d.toISOString().split("T")[0]);
  }

  var delta7 = ((pred[6]-hoy.precio)/hoy.precio*100).toFixed(1);
  var delta1 = ((pred[0]-hoy.precio)/hoy.precio*100).toFixed(1);
  var mae = pred.map(function(p,i){ return Math.abs(p - (est.med + (est.std * 0))); });

  document.getElementById("metricas").innerHTML =
    "<span class='metrica'><span class='metrica-val'>" + (delta1>0?"+":"") + delta1 + "%</span><span class='metrica-label'>Dia 1 vs hoy</span></span>" +
    "<span class='metrica'><span class='metrica-val'>" + (delta7>0?"+":"") + delta7 + "%</span><span class='metrica-label'>Dia 7 vs hoy</span></span>" +
    "<span class='metrica'><span class='metrica-val'>$" + pred[0].toLocaleString("es-CO") + "</span><span class='metrica-label'>Precio manana</span></span>" +
    "<span class='metrica'><span class='metrica-val'>$" + pred[6].toLocaleString("es-CO") + "</span><span class='metrica-label'>Precio dia 7</span></span>";

  Plotly.newPlot("chart", [
    {
      x: hist.map(function(d){return d.fecha;}),
      y: hist.map(function(d){return d.precio;}),
      type:"scatter", mode:"lines", name:"Real",
      line:{color:"#2d6a4f", width:2},
      hovertemplate:"%{x}<br><b>$%{y:,.0f}</b><extra></extra>",
    },
    {
      x: [hoy.fecha].concat(fechasPred),
      y: [hoy.precio].concat(pred),
      type:"scatter", mode:"lines+markers", name:"Prediccion",
      line:{color:"#c77b2e", width:2, dash:"dot"},
      marker:{size:5, color:"#c77b2e"},
      hovertemplate:"%{x}<br><b>~$%{y:,.0f}</b><extra></extra>",
    }
  ], {
    margin:{t:8,l:62,r:12,b:44},
    paper_bgcolor:"transparent", plot_bgcolor:"#f8faf5",
    font:{family:"Courier New,monospace", size:10, color:"#6b7d6e"},
    xaxis:{gridcolor:"#e2e8dc", showline:false, tickformat:"%b %y"},
    yaxis:{gridcolor:"#e2e8dc", showline:false, tickformat:",.0f", tickprefix:"$"},
    hovermode:"x unified", showlegend:false,
    shapes:[{type:"line", x0:hoy.fecha, x1:hoy.fecha, y0:0, y1:1, yref:"paper",
      line:{color:"#d4dace", width:1, dash:"dot"}}],
  }, {responsive:true, displayModeBar:false});
}

// Construir botones
var sel = document.getElementById("selector");
Object.keys(MODELOS).forEach(function(key) {
  var btn = document.createElement("button");
  btn.className = "btn-modelo" + (key === _modeloActual ? " active" : "");
  btn.id = "btn-" + key;
  btn.textContent = MODELOS[key].nombre.split("(")[0].trim();
  btn.onclick = function(){ renderModelo(key); };
  sel.appendChild(btn);
});

cargarDatos();
</script>
