<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Figura Poster</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
body { margin: 20px; background: #eee; font-family: Arial, sans-serif; }
#chart { width: 800px; height: 800px; background: white; }
.btn {
  margin: 12px 0; padding: 12px 28px;
  background: #2d6a4f; color: white; border: none;
  border-radius: 5px; font-size: 15px; cursor: pointer; display: block;
}
.info { font-size: 12px; color: #666; margin-bottom: 8px; }
</style>
</head>
<body>
<p class="info">Vista previa (800x800px). La descarga genera 1200x1200px apta para una columna de poster a 300 dpi.</p>
<button class="btn" onclick="descargar()">Descargar PNG para poster (1200x1200px)</button>
<div id="chart"></div>

<script>
var ACOPIO = [
  {f:"2026-02-06",p:1200},{f:"2026-02-09",p:1300},{f:"2026-02-13",p:900},
  {f:"2026-02-16",p:1000},{f:"2026-02-27",p:1100},{f:"2026-03-02",p:1100},
  {f:"2026-03-13",p:1200},{f:"2026-03-20",p:1100},{f:"2026-03-27",p:1000},
  {f:"2026-03-30",p:1000},{f:"2026-04-06",p:1300},{f:"2026-04-13",p:1100},
  {f:"2026-04-20",p:1300},{f:"2026-04-24",p:1100},{f:"2026-04-27",p:1200},
  {f:"2026-05-08",p:1400},{f:"2026-05-11",p:1400},{f:"2026-05-15",p:1300},
  {f:"2026-05-16",p:1300},{f:"2026-05-17",p:1400},{f:"2026-05-18",p:1400},
  {f:"2026-05-20",p:1300},{f:"2026-05-22",p:1400},{f:"2026-05-25",p:1500},
  {f:"2026-05-29",p:1600},
];

var DANE = [
  {f:"2026-02-02",p:1650},{f:"2026-02-05",p:1600},{f:"2026-02-06",p:1250},
  {f:"2026-02-09",p:1250},{f:"2026-02-13",p:900},{f:"2026-02-16",p:1000},
  {f:"2026-02-20",p:1050},{f:"2026-02-23",p:1000},{f:"2026-02-27",p:1100},
  {f:"2026-03-02",p:1100},{f:"2026-03-06",p:1050},{f:"2026-03-10",p:1200},
  {f:"2026-03-13",p:1250},{f:"2026-03-18",p:1350},{f:"2026-03-20",p:1150},
  {f:"2026-03-27",p:1075},{f:"2026-03-30",p:1050},{f:"2026-04-01",p:1200},
  {f:"2026-04-06",p:1300},{f:"2026-04-08",p:1650},{f:"2026-04-13",p:1100},
  {f:"2026-04-15",p:1400},{f:"2026-04-20",p:1250},{f:"2026-04-24",p:1150},
  {f:"2026-04-27",p:1250},{f:"2026-04-30",p:1450},{f:"2026-05-05",p:1500},
  {f:"2026-05-07",p:1550},{f:"2026-05-11",p:1350},{f:"2026-05-14",p:1550},
  {f:"2026-05-18",p:1350},{f:"2026-05-21",p:1500},{f:"2026-05-25",p:1450},
  {f:"2026-05-28",p:1700},{f:"2026-05-29",p:1600},
];

var pa   = ACOPIO.map(function(d){return d.p;});
var prom = Math.round(pa.reduce(function(a,b){return a+b;},0)/pa.length);
var mn   = Math.min.apply(null,pa);
var mx   = Math.max.apply(null,pa);
var std  = Math.round(Math.sqrt(pa.reduce(function(s,x){return s+(x-prom)*(x-prom);},0)/pa.length));
var cv   = Math.round(std/prom*100);
var iFMin = pa.indexOf(mn);
var iFMax = pa.indexOf(mx);

function dibujar(sz) {
  Plotly.newPlot("chart", [
    // Banda tipica
    {
      x:["2026-02-01","2026-05-31","2026-05-31","2026-02-01"],
      y:[prom+std,prom+std,prom-std,prom-std],
      fill:"toself",type:"scatter",mode:"none",
      fillcolor:"rgba(82,183,136,0.15)",
      name:"Rango tipico",hoverinfo:"skip",showlegend:true,
    },
    // DANE
    {
      x:DANE.map(function(d){return d.f;}),
      y:DANE.map(function(d){return d.p;}),
      type:"scatter",mode:"lines",
      name:"DANE-SIPSA Pasto",
      line:{color:"#52b788",width:sz<20?2:3,dash:"dot"},
      opacity:0.85,
      hovertemplate:"%{x|%d/%m}<br><b>$%{y:,.0f}/kg</b><extra>DANE Pasto</extra>",
    },
    // Acopio
    {
      x:ACOPIO.map(function(d){return d.f;}),
      y:pa,
      type:"scatter",mode:"lines+markers",
      name:"Acopio Ipiales (n=25)",
      line:{color:"#2d6a4f",width:sz<20?2.5:4},
      marker:{size:sz<20?9:13,color:"#2d6a4f",
              line:{width:2,color:"white"}},
      hovertemplate:"%{x|%d/%m}<br><b>$%{y:,.0f}/kg</b><extra>Acopio Ipiales</extra>",
    },
    // Promedio
    {
      x:["2026-02-01","2026-05-31"],y:[prom,prom],
      type:"scatter",mode:"lines",
      name:"Promedio $"+prom.toLocaleString("es-CO")+"/kg",
      line:{color:"#c77b2e",width:sz<20?2:3,dash:"dash"},
      hoverinfo:"skip",
    },
    // Min marker
    {
      x:[ACOPIO[iFMin].f],y:[mn],
      type:"scatter",mode:"markers",showlegend:false,
      marker:{size:sz<20?13:18,color:"#b5363a",
              symbol:"triangle-down",line:{width:2,color:"white"}},
      hoverinfo:"skip",
    },
    // Max marker
    {
      x:[ACOPIO[iFMax].f],y:[mx],
      type:"scatter",mode:"markers",showlegend:false,
      marker:{size:sz<20?13:18,color:"#1a5c9e",
              symbol:"triangle-up",line:{width:2,color:"white"}},
      hoverinfo:"skip",
    },
  ], {
    title:{
      text:"Precio de la papa negra en Ipiales<br>" +
           "<span style='font-size:"+(sz-2)+"px;color:#444;font-weight:normal;'>" +
           "Acopio local vs referencia DANE-SIPSA Pasto | Feb - May 2026</span>",
      font:{size:sz+6,color:"#1c2b1e",family:"Arial Black, Arial"},
      x:0.5,xanchor:"center",
    },
    paper_bgcolor:"white",
    plot_bgcolor:"#f8faf5",
    font:{family:"Arial",size:sz,color:"#2a3a2a"},
    xaxis:{
      title:{text:"",font:{size:sz}},
      gridcolor:"#dde8da",showline:true,linecolor:"#aaa",linewidth:2,
      type:"date",tickformat:"%b %Y",
      tickangle:-40,nticks:6,
      tickfont:{size:sz},
    },
    yaxis:{
      title:{text:"Precio ($/kg)",font:{size:sz},standoff:8},
      gridcolor:"#dde8da",showline:true,linecolor:"#aaa",linewidth:2,
      tickformat:",.0f",tickprefix:"$",
      range:[680,1850],
      tickfont:{size:sz},
    },
    legend:{
      orientation:"h",x:0.5,xanchor:"center",y:-0.18,
      font:{size:sz-1},bgcolor:"rgba(255,255,255,0.9)",
      bordercolor:"#ccc",borderwidth:1,
    },
    margin:{t:100,l:90,r:20,b:110},
    annotations:[
      // Caja estadisticas - esquina superior derecha
      {
        x:0.01,y:0.99,xref:"paper",yref:"paper",
        xanchor:"left",yanchor:"top",
        text:"<b>Resumen estadistico</b><br>" +
             "Minimo:   $"+mn.toLocaleString("es-CO")+"/kg<br>"+
             "Maximo:  $"+mx.toLocaleString("es-CO")+"/kg<br>"+
             "Promedio: $"+prom.toLocaleString("es-CO")+"/kg<br>"+
             "Desv. est.: $"+std.toLocaleString("es-CO")+"/kg<br>"+
             "Coef. var.: "+cv+"%",
        showarrow:false,
        font:{size:sz,color:"#1c2b1e",family:"Arial"},
        bgcolor:"rgba(255,255,255,0.95)",
        bordercolor:"#2d6a4f",borderwidth:2,
        borderpad:10,align:"left",
      },
      // Flecha min
      {
        x:ACOPIO[iFMin].f,y:mn,ax:50,ay:55,
        text:"<b>$"+mn.toLocaleString("es-CO")+"</b><br>Minimo",
        font:{size:sz-1,color:"#b5363a",family:"Arial"},
        showarrow:true,arrowhead:2,arrowcolor:"#b5363a",arrowwidth:2,
        bgcolor:"white",bordercolor:"#b5363a",borderwidth:1,borderpad:5,
      },
      // Flecha max
      {
        x:ACOPIO[iFMax].f,y:mx,ax:-50,ay:-55,
        text:"<b>$"+mx.toLocaleString("es-CO")+"</b><br>Maximo",
        font:{size:sz-1,color:"#1a5c9e",family:"Arial"},
        showarrow:true,arrowhead:2,arrowcolor:"#1a5c9e",arrowwidth:2,
        bgcolor:"white",bordercolor:"#1a5c9e",borderwidth:1,borderpad:5,
      },
      // Pie
      {
        x:0.5,y:-0.3,xref:"paper",yref:"paper",xanchor:"center",
        text:"Figura 1. Precios registrados en plaza de mercado Ipiales vs DANE-SIPSA Pasto (Feb-May 2026).<br>"+
             "Fuente: Registros de acopio propio + servicio SOAP DANE-SIPSA. Semillero Electrothings, SENA Narino.",
        showarrow:false,
        font:{size:sz-3,color:"#555",family:"Arial"},
        align:"center",
      },
    ],
  },{responsive:false,displayModeBar:false});
}

function descargar() {
  // Dibujar version grande para descarga
  dibujar(28);
  setTimeout(function(){
    Plotly.downloadImage("chart",{
      format:"png", width:1200, height:1200,
      filename:"figura1_papa_ipiales_poster",
      scale:1,
    });
    // Restaurar vista normal
    setTimeout(function(){ dibujar(16); }, 2000);
  }, 800);
}

// Vista previa con fuente normal
dibujar(16);
</script>
</body>
</html>
